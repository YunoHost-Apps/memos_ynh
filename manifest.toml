packaging_format = 2

id = "memos"
name = "Memos"
description.en = "Lightweight note-taking solution"
description.fr = "Solution légère de prise de notes"

version = "0.25.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
demo = "https://demo.usememos.com"
website = "https://usememos.com/"
admindoc = "https://usememos.com/docs"
code = "https://github.com/usememos/memos"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

        [resources.sources.main]
        amd64.url = "https://github.com/usememos/memos/releases/download/v0.25.1/memos_v0.25.1_linux_amd64.tar.gz"
        amd64.sha256 = "7dedf1139179d4f9526ea3c82f296b2c9ca5d0822fe29e362ece28816e5be284"
        arm64.url = "https://github.com/usememos/memos/releases/download/v0.25.1/memos_v0.25.1_linux_arm64.tar.gz"
        arm64.sha256 = "6f9897cef083de3d2f4472f3ad9a3d8dd37e342d3a6b638247d1b3946f963955"

        in_subdir = false
        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = ".*_linux_amd64.tar.gz"
        autoupdate.asset.arm64 = ".*_linux_arm64.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false
    api.url = "/memos.api"
    api.allowed = "visitors"
    api.auth_header = false
    api.show_tile = false

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
