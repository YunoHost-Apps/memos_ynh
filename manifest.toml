packaging_format = 2

id = "memos"
name = "Memos"
description.en = "Lightweight note-taking solution"
description.fr = "Solution légère de prise de notes"

version = "0.28.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
demo = "https://demo.usememos.com"
website = "https://usememos.com/"
admindoc = "https://usememos.com/docs"
code = "https://github.com/usememos/memos"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

        [resources.sources.main]
        amd64.url = "https://github.com/usememos/memos/releases/download/v0.28.0/memos_0.28.0_linux_amd64.tar.gz"
        amd64.sha256 = "16c05e1758c6e17db7d833eb86e7e4583894495ae76909c76b7f5b215d08d62f"
        arm64.url = "https://github.com/usememos/memos/releases/download/v0.28.0/memos_0.28.0_linux_arm64.tar.gz"
        arm64.sha256 = "b1a9f3c1efcd6d4e8ed8e2960028a7382b5c526523436ad81f0bafbc2b05ef79"

        in_subdir = false
        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = ".*_linux_amd64.tar.gz"
        autoupdate.asset.arm64 = ".*_linux_arm64.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false
    api.url = "/memos.api"
    api.allowed = "visitors"
    api.auth_header = false
    api.show_tile = false

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
